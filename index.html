<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Question for You ❤️</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@300;400;600&display=swap" rel="stylesheet">
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Confetti Library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <style>
    :root{
      --primary:#ff4d6d;
      --secondary:#ff758f;
      --glass:rgba(255,255,255,0.1);
      --glass-border:rgba(255,255,255,0.2);
      --shadow:0 15px 35px rgba(0,0,0,0.3);
    }

    *{margin:0;padding:0;box-sizing:border-box;cursor:none}

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:radial-gradient(circle at center,#590d22,#2e0812);
      font-family:'Quicksand',sans-serif;
      overflow:hidden;
      perspective:1000px;
    }

    /* --- Custom Cursor --- */
    .cursor{
      width:20px;height:20px;background:var(--primary);border-radius:50%;
      position:fixed;pointer-events:none;z-index:9999;
      box-shadow:0 0 20px var(--primary);
      transform:translate(-50%,-50%);
      mix-blend-mode:screen;
      transition:transform .1s ease;
    }
    .cursor.active{transform:translate(-50%,-50%) scale(2);background:#fff}

    /* --- Floating Hearts Background --- */
    .heart-bg{
      position:absolute;color:var(--secondary);font-size:1.5rem;
      animation:floatUp linear forwards;opacity:0;z-index:0;user-select:none;
    }
    @keyframes floatUp{
      0%{transform:translateY(100vh) scale(.5);opacity:0}
      20%{opacity:.6}
      100%{transform:translateY(-10vh) scale(1.2) rotate(360deg);opacity:0}
    }

    /* --- Blooming Flowers Garden --- */
    .garden-container{
      position:absolute;bottom:0;left:0;width:100%;height:180px;
      display:flex;justify-content:space-around;align-items:flex-end;
      z-index:5;pointer-events:none;
    }
    .flower{
      font-size:4rem;color:#ff0a54;
      transform-origin:bottom center;transform:scale(0);
      animation:bloom 2s cubic-bezier(.175,.885,.32,1.275) forwards;
      filter:drop-shadow(0 0 15px rgba(255,10,84,.6));
    }
    @keyframes bloom{to{transform:scale(1)}}

    /* --- Music Player --- */
    .music-player{
      position:fixed;top:20px;right:20px;z-index:100;
      display:flex;align-items:center;gap:10px;
    }
    .vinyl-icon{font-size:2rem;color:var(--secondary);transition:.5s}
    .spinning{animation:spin 3s linear infinite;color:var(--primary)}
    @keyframes spin{100%{transform:rotate(360deg)}}
    .toggle-sound{
      background:var(--glass);
      border:1px solid var(--glass-border);
      color:#fff;padding:10px 20px;border-radius:30px;font-weight:bold;
      backdrop-filter:blur(10px);
      transition:.3s;
    }
    .toggle-sound:hover{background:var(--primary)}

    /* --- The Card --- */
    .card-container{
      width:450px;min-height:500px;position:relative;
      transform-style:preserve-3d;transition:transform .1s;z-index:50;
    }
    .glass-card{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(15px);
      -webkit-backdrop-filter:blur(15px);
      border:1px solid var(--glass-border);
      border-radius:24px;
      padding:3rem;text-align:center;
      box-shadow:var(--shadow);
      color:#fff;position:absolute;width:100%;height:100%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      backface-visibility:hidden;
      transform:translateZ(20px);
    }

    h1{
      font-family:'Dancing Script',cursive;
      font-size:3.5rem;margin-bottom:1rem;
      background:linear-gradient(to right,#ff4d6d,#fff0f3);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 5px 15px rgba(255,77,109,0.3);
    }

    .gif-wrapper{
      width:100%;height:200px;margin-bottom:2rem;border-radius:15px;
      overflow:hidden;position:relative;
    }
    .gif-wrapper img{
      width:100%;height:100%;
      object-fit:contain;
      filter:drop-shadow(0 10px 10px rgba(0,0,0,0.2));
    }

    .btn-group{
      display:flex;gap:20px;margin-top:10px;position:relative;z-index:10;
      width:100%;justify-content:center;align-items:center;
    }
    button{
      padding:15px 40px;border-radius:50px;border:none;
      font-size:1.1rem;font-weight:bold;
      transition:all .3s ease;
      position:relative;overflow:hidden;white-space:nowrap;
    }
    .btn-yes{
      background:#fff;color:var(--primary);
      box-shadow:0 0 20px rgba(255,255,255,0.2);
      z-index:2;
    }
    .btn-yes:hover{
      transform:scale(1.1);
      background:var(--primary);color:#fff;
      box-shadow:0 0 40px var(--primary);
    }
    .btn-no{
      background:rgba(255,255,255,0.1);
      color:#fff;border:1px solid rgba(255,255,255,0.3);
      z-index:100;
    }

    /* ✅ Hide first page when overlay opens */
    body.overlay-open #card,
    body.overlay-open #garden,
    body.overlay-open .music-player{
      opacity:0 !important;
      pointer-events:none !important;
      transform:scale(0.98) !important;
      transition: .35s ease !important;
    }

    /* --- Overlay Letter --- */
    .overlay{
      position:fixed;inset:0;
      background:#070109;              /* ✅ FULL solid background (no first page visible) */
      z-index:999999;                  /* ✅ above EVERYTHING */
      display:flex;justify-content:center;align-items:center;
      opacity:0;pointer-events:none;
      transition: .6s ease;
      overflow:hidden;
    }
    .overlay.active{opacity:1;pointer-events:all}

    /* ===== BEHIND LETTER: UP/DOWN IMAGE GRID ===== */
    .bg-carousel{
      position:absolute;inset:-40px;   /* little extra so edges never show empty */
      z-index:0;pointer-events:none;
      display:flex;gap:22px;
      padding:60px 24px;
      opacity:0.32;                    /* ✅ stronger visibility */
      filter: blur(0.2px);
    }
    .bg-track{
      flex:1;
      display:grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 110px;
      gap:16px;
      will-change:transform;
    }
    .bg-tile{
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.16);
      box-shadow:0 14px 40px rgba(0,0,0,0.35);
      position:relative;
    }
    .bg-tile img{
      width:100%;height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(1.08) contrast(1.08);
      transform:scale(1.02);
    }
    .bg-tile::after{
      content:"";
      position:absolute;inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0));
      pointer-events:none;
    }
    .bg-up{ animation:bgScrollUp 16s linear infinite; }
    .bg-down{ animation:bgScrollDown 18s linear infinite; }
    @keyframes bgScrollUp{ 0%{transform:translateY(0)} 100%{transform:translateY(-50%)} }
    @keyframes bgScrollDown{ 0%{transform:translateY(-50%)} 100%{transform:translateY(0)} }

    .letter-card{
      background:#fff;
      padding:3rem;
      width:90%;
      max-width:600px;
      border-radius:12px;
      transform:scale(.8) translateY(50px);
      transition:.8s cubic-bezier(.175,.885,.32,1.275);
      position:relative;
      text-align:center;
      box-shadow:0 0 60px rgba(255,77,109,0.5);
      z-index:2;
    }
    .overlay.active .letter-card{transform:scale(1) translateY(0)}

    .letter-text{
      font-size:1.2rem;color:#333;line-height:1.8;text-align:left;
      white-space:pre-wrap;min-height:200px;
    }
    .close-btn{
      margin-top:20px;background:var(--primary);color:#fff;
      padding:10px 30px;border-radius:5px;
    }

    @media (max-width: 600px){
      .card-container{width:90%}
      h1{font-size:2.5rem}
      .flower{font-size:3rem}
      .bg-track{grid-auto-rows:92px}
      .bg-carousel{opacity:0.26}
    }
  </style>
</head>

<body>
  <div class="cursor"></div>

  <audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-love.mp3" type="audio/mpeg">
  </audio>

  <div class="music-player">
    <i class="fas fa-compact-disc vinyl-icon" id="vinyl"></i>
    <button class="toggle-sound" onclick="toggleMusic()">Play Music</button>
  </div>

  <div class="garden-container" id="garden"></div>

  <div class="card-container" id="card">
    <div class="glass-card">
      <h1 id="mainTitle">Will You Be My Valentine? 🌹</h1>

      <div class="gif-wrapper">
        <img id="mainGif"
          src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExYmZlZmRjM2ExM2I1NDM2N2FkNDY1MzU5ZGY2MjM2ZDI4YmQ2YjQ2MyZlcD12MV9pbnRlcm5hbF9naWZzX2dpZklkJmN0PXM/cLS1cfxvGOPVpf9w3y/giphy.gif"
          alt="Cute Gif">
      </div>

      <div class="btn-group">
        <button class="btn-yes" id="yesBtn" onclick="celebrate()">YES</button>
        <button class="btn-no" id="noBtn" onmouseover="handleNoInteraction()" onclick="handleNoInteraction()">NO</button>
      </div>
    </div>
  </div>

  <!-- Overlay -->
  <div class="overlay" id="overlay">
    <div class="bg-carousel" aria-hidden="true">
      <div class="bg-track bg-up" id="bgUp"></div>
      <div class="bg-track bg-down" id="bgDown"></div>
    </div>

    <div class="letter-card">
      <h2 style="font-family:'Dancing Script'; color:var(--primary); font-size:2.5rem; margin-bottom:20px;">
        I knew you'd say Yes! ❤️
      </h2>
      <div class="letter-text" id="typewriterText"></div>
      <button class="close-btn" onclick="location.reload()">Replay</button>
    </div>
  </div>

  <script>
    // Cursor
    const cursor = document.querySelector('.cursor');
    document.addEventListener('mousemove', (e) => {
      cursor.style.left = e.clientX + 'px';
      cursor.style.top = e.clientY + 'px';
    });
    document.addEventListener('mousedown', () => cursor.classList.add('active'));
    document.addEventListener('mouseup', () => cursor.classList.remove('active'));

    // Click heart burst
    document.addEventListener('click', (e) => createHeartBurst(e.clientX, e.clientY));
    function createHeartBurst(x, y) {
      const heart = document.createElement('i');
      heart.className = 'fas fa-heart heart-bg';
      heart.style.left = x + 'px';
      heart.style.top = y + 'px';
      heart.style.position = 'fixed';
      heart.style.color = Math.random() > 0.5 ? '#ff4d6d' : '#ff758f';
      heart.style.fontSize = Math.random() * 20 + 20 + 'px';
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2000);
    }

    // Floating hearts
    function startFloatingHearts() {
      setInterval(() => {
        const heart = document.createElement('i');
        heart.classList.add('fas', 'fa-heart', 'heart-bg');
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 4 + 's';
        heart.style.opacity = Math.random() * 0.5 + 0.2;
        heart.style.fontSize = Math.random() * 20 + 10 + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 6000);
      }, 300);
    }
    startFloatingHearts();

    // Garden
    function growGarden() {
      const garden = document.getElementById('garden');
      const flowerCount = Math.floor(window.innerWidth / 40);
      for (let i = 0; i < flowerCount; i++) {
        let flower = document.createElement('i');
        const types = ['fa-spa', 'fa-clover', 'fa-seedling', 'fa-fan'];
        flower.classList.add('fas', types[Math.floor(Math.random() * types.length)], 'flower');
        flower.style.color = `hsl(${330 + Math.random() * 30}, 100%, 60%)`;
        flower.style.animationDelay = Math.random() * 2 + 's';
        flower.style.fontSize = (Math.random() * 30 + 30) + 'px';
        garden.appendChild(flower);
      }
    }
    growGarden();

    // 3D tilt
    const card = document.getElementById('card');
    document.addEventListener('mousemove', (e) => {
      let xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      let yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // Music
    const music = document.getElementById('bgMusic');
    const vinyl = document.getElementById('vinyl');
    const btn = document.querySelector('.toggle-sound');
    let isPlaying = false;

    function toggleMusic() {
      if (!isPlaying) {
        music.play();
        vinyl.classList.add('spinning');
        btn.innerText = "Pause";
      } else {
        music.pause();
        vinyl.classList.remove('spinning');
        btn.innerText = "Play Music";
      }
      isPlaying = !isPlaying;
    }

    // No button
    const noBtn = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const texts = ["Are you sure?", "Really?", "Think again!", "Last chance!", "Pookie pls 🥺", "Don't do this!", "I'm gonna cry!", "💔"];
    let textIndex = 0;
    let yesScale = 1;

    function handleNoInteraction() {
      if (noBtn.parentNode !== document.body) {
        const rect = noBtn.getBoundingClientRect();
        noBtn.style.position = 'fixed';
        noBtn.style.left = rect.left + 'px';
        noBtn.style.top = rect.top + 'px';
        document.body.appendChild(noBtn);
      }

      const winW = window.innerWidth, winH = window.innerHeight;
      const btnW = noBtn.offsetWidth, btnH = noBtn.offsetHeight;
      const padding = 20;

      const minX = padding, maxX = winW - btnW - padding;
      const minY = padding, maxY = winH - btnH - padding;

      let randomX = Math.random() * (maxX - minX) + minX;
      let randomY = Math.random() * (maxY - minY) + minY;

      randomX = Math.max(minX, Math.min(maxX, randomX));
      randomY = Math.max(minY, Math.min(maxY, randomY));

      noBtn.style.left = `${randomX}px`;
      noBtn.style.top = `${randomY}px`;

      noBtn.innerText = texts[textIndex];
      textIndex = (textIndex + 1) % texts.length;

      yesScale += 0.3;
      yesBtn.style.transform = `scale(${yesScale})`;
      yesBtn.innerText = "YES! " + "❤️".repeat(Math.floor(yesScale));
    }

    // Letter
    const letterContent = `My Dearest,

I've been waiting for the perfect moment to ask you this. You are the sunshine in my day and the moonlight in my night. 

Every laugh we share, every silence we hold, makes me fall in love with you all over again.

I promise to cherish you, support you, and annoy you (just a little bit) for as long as you'll let me.

Will you make me the luckiest person in the world?

Love always,
[Your Name]`;

    let i = 0;
    const speed = 40;
    function typeWriter() {
      if (i < letterContent.length) {
        document.getElementById("typewriterText").innerHTML +=
          letterContent.charAt(i) === '\n' ? '<br>' : letterContent.charAt(i);
        i++;
        setTimeout(typeWriter, speed);
      }
    }

    /* ✅ Put your REAL image URLs here */
    const bgImages = [
      "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?auto=format&fit=crop&w=900&q=70",
      "https://images.unsplash.com/photo-1518895949257-7621c3c786d7?auto=format&fit=crop&w=900&q=70",
      "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=70",
      "https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=900&q=70",
      "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=900&q=70",
      "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=70",
      "https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=900&q=70",
      "https://images.unsplash.com/photo-1519985176271-adb1088fa94c?auto=format&fit=crop&w=900&q=70"
    ];

    function buildBgTrackWithImages(trackEl, count = 45) {
      trackEl.innerHTML = "";
      for (let k = 0; k < count; k++) {
        const tile = document.createElement("div");
        tile.className = "bg-tile";

        const img = document.createElement("img");
        img.loading = "lazy";
        img.decoding = "async";
        img.src = bgImages[k % bgImages.length];
        img.alt = "";

        tile.appendChild(img);
        trackEl.appendChild(tile);
      }
      trackEl.innerHTML += trackEl.innerHTML; // duplicate for loop
    }

    buildBgTrackWithImages(document.getElementById("bgUp"), 45);
    buildBgTrackWithImages(document.getElementById("bgDown"), 45);

    // Celebration (YES)
    function celebrate() {
      if (!isPlaying) toggleMusic();

      // ✅ hide first page elements
      document.body.classList.add("overlay-open");

      // Confetti
      var duration = 3000;
      var end = Date.now() + duration;

      (function frame() {
        confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff4d6d', '#ffb3c1', '#ffffff'] });
        confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff4d6d', '#ffb3c1', '#ffffff'] });
        if (Date.now() < end) requestAnimationFrame(frame);
      }());

      // Show overlay + start typing
      document.getElementById('overlay').classList.add('active');
      typeWriter();
    }
  </script>
</body>
</html>
